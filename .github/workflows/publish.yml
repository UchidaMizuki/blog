on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Publish to Quarto Pub
        run: quarto publish quarto-pub --no-render --no-prompt --token "${{ secrets.QUARTO_PUB_AUTH_TOKEN }}"