on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install babelquarto
        run: |
          Rscript -e "install.packages('pak')"
          Rscript -e "pak::pak('ropensci-review-tools/babelquarto')"

      - name: Render multilingual site
        run: Rscript -e "babelquarto::render_website()"
        env:
          BABELQUARTO_CI_URL: "https://uchidamizuki.quarto.pub/blog"

      - name: Publish to Quarto Pub
        run: quarto publish quarto-pub --no-render --no-prompt --token "${{ secrets.QUARTO_PUB_AUTH_TOKEN }}"