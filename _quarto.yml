project:
  type: website
  output-dir: docs
  render:
    - "**/*.qmd"
    - "!AGENTS.md"

website:
  title: "UchidaMizuki"
  site-url: "https://uchidamizuki.quarto.pub/blog"
  favicon: logo.png
  navbar:
    right:
      - icon: mastodon
        href: https://social.vivaldi.net/@UchidaMizuki
      - icon: github
        href: https://github.com/UchidaMizuki
      - text: SoundCloud
        href: https://soundcloud.com/UchidaMizuki
      - text: Flickr
        href: https://www.flickr.com/uchidamizuki
      - about.qmd
  google-analytics: "G-3NGKDDYEYX"

format:
  html:
    theme: simplex
    css: styles.css

editor: visual

comments:
  giscus: 
    repo: UchidaMizuki/blog

execute:
  freeze: auto

babelquarto:
  languagecodes:
  - name: en
    text: "English"
  - name: ja
    text: "日本語"
  mainlanguage: 'ja'
  languages: ['en']
title-en: "UchidaMizuki"
lang: ja

